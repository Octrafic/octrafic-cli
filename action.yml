name: 'Octrafic API Test'
description: 'Run AI-powered API tests with Octrafic in your CI/CD pipeline'
author: 'Octrafic'
branding:
  icon: 'zap'
  color: 'blue'

inputs:
  url:
    description: 'Base URL of the API to test (e.g. https://api.example.com)'
    required: true

  spec:
    description: 'Path to OpenAPI/Swagger spec file. Required when using prompt.'
    required: false

  path:
    description: 'Path to test file: Postman collection (.json), shell script (.sh), or pytest (.py)'
    required: false

  prompt:
    description: 'Natural language instruction for AI-generated tests. Requires spec and OCTRAFIC_API_KEY env var.'
    required: false

  version:
    description: 'Octrafic CLI version to install (e.g. v0.4.2). Defaults to latest release.'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Install Octrafic CLI
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        set -e

        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)          ARCH_NAME="x86_64" ;;
          aarch64|arm64)   ARCH_NAME="arm64"  ;;
          armv7l)          ARCH_NAME="armv7"  ;;
          *)
            echo "::error::Unsupported architecture: $ARCH"
            exit 1
            ;;
        esac

        VERSION="$INPUT_VERSION"
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(curl -fsSL "https://api.github.com/repos/Octrafic/octrafic-cli/releases/latest" | jq -r '.tag_name')
        fi
        echo "Installing Octrafic ${VERSION} (${RUNNER_OS}/${ARCH_NAME})"

        BIN_DIR="$RUNNER_TEMP/octrafic-bin"
        mkdir -p "$BIN_DIR"

        case "$RUNNER_OS" in
          Linux|macOS)
            [ "$RUNNER_OS" = "Linux" ] && OS_NAME="Linux" || OS_NAME="Darwin"
            curl -fsSL "https://github.com/Octrafic/octrafic-cli/releases/download/${VERSION}/octrafic_${OS_NAME}_${ARCH_NAME}.tar.gz" \
              -o "$RUNNER_TEMP/octrafic.tar.gz"
            tar -xzf "$RUNNER_TEMP/octrafic.tar.gz" -C "$BIN_DIR" octrafic
            chmod +x "$BIN_DIR/octrafic"
            ;;
          Windows)
            curl -fsSL "https://github.com/Octrafic/octrafic-cli/releases/download/${VERSION}/octrafic_Windows_${ARCH_NAME}.zip" \
              -o "$RUNNER_TEMP/octrafic.zip"
            EXTRACT_DIR="$RUNNER_TEMP/octrafic-extract"
            mkdir -p "$EXTRACT_DIR"
            unzip -q "$RUNNER_TEMP/octrafic.zip" -d "$EXTRACT_DIR"
            cp "$(find "$EXTRACT_DIR" -name 'octrafic.exe' | head -1)" "$BIN_DIR/octrafic.exe"
            ;;
          *)
            echo "::error::Unsupported OS: $RUNNER_OS"
            exit 1
            ;;
        esac

        echo "$BIN_DIR" >> "$GITHUB_PATH"
        echo "Octrafic ${VERSION} installed"

    - name: Run API Tests
      shell: bash
      env:
        INPUT_URL: ${{ inputs.url }}
        INPUT_SPEC: ${{ inputs.spec }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_PROMPT: ${{ inputs.prompt }}
      run: |
        set -e

        ARGS=(test --url "$INPUT_URL")

        [ -n "$INPUT_SPEC" ]   && ARGS+=(--spec   "$INPUT_SPEC")
        [ -n "$INPUT_PATH" ]   && ARGS+=(--path   "$INPUT_PATH")
        [ -n "$INPUT_PROMPT" ] && ARGS+=(--prompt "$INPUT_PROMPT")

        octrafic "${ARGS[@]}"
